version: '3.9'

services:
  # ---- PostgreSQL with PostGIS ----
  postgres:
    image: postgis/postgis:16-3.4
    container_name: wwtrail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wwtrail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wwtrail_password}
      POSTGRES_DB: ${POSTGRES_DB:-wwtrail_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./wwtrail-backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - wwtrail-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wwtrail} -d ${POSTGRES_DB:-wwtrail_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: wwtrail-redis
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - wwtrail-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---- Backend API (Express + Prisma) ----
  backend:
    build:
      context: ./wwtrail-backend
      dockerfile: Dockerfile
    container_name: wwtrail-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wwtrail}:${POSTGRES_PASSWORD:-wwtrail_password}@postgres:5432/${POSTGRES_DB:-wwtrail_db}?schema=public
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_jwt_refresh_secret_change_me}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      REDIS_URL: redis://${REDIS_PASSWORD:+:$REDIS_PASSWORD@}redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_TTL: ${REDIS_TTL:-3600}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      UPLOAD_PATH: /app/uploads
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AUTO_TRANSLATE_ENABLED: ${AUTO_TRANSLATE_ENABLED:-false}
      AUTO_TRANSLATE_LANGUAGES: ${AUTO_TRANSLATE_LANGUAGES:-EN,IT,CA,FR,DE}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-ES}
      AUTO_TRANSLATE_OVERWRITE: ${AUTO_TRANSLATE_OVERWRITE:-false}
      AUTO_TRANSLATE_BACKGROUND: ${AUTO_TRANSLATE_BACKGROUND:-true}
      AUTO_TRANSLATE_ONLY_PUBLISHED: ${AUTO_TRANSLATE_ONLY_PUBLISHED:-true}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@wwtrail.com}
      MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - wwtrail-network

  # ---- Frontend (Next.js) ----
  frontend:
    build:
      context: ./wwtrail-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-WWTRAIL}
        NEXT_PUBLIC_DEFAULT_LANGUAGE: ${NEXT_PUBLIC_DEFAULT_LANGUAGE:-es}
    container_name: wwtrail-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - wwtrail-network

  # ---- Nginx (reverse proxy, sin SSL) ----
  nginx:
    image: nginx:alpine
    container_name: wwtrail-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.nossl.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - wwtrail-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  wwtrail-network:
    driver: bridge
