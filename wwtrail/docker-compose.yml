# Local development compose
# Usage: cd wwtrail && docker compose up -d
#
# This gives you PostgreSQL + PostGIS locally.
# Run the Next.js app with `npm run dev` outside Docker.

version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: wwtrail-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wwtrail
      POSTGRES_PASSWORD: wwtrail_password
      POSTGRES_DB: wwtrail_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wwtrail -d wwtrail_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
